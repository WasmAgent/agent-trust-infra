name: Incubation release boundary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary:
    name: Publishing disabled in incubation repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Explain release boundary
        run: |
          echo "npm and binary publishing are disabled in agent-trust-infra."
          echo "This repository incubates specs and prototypes only."
          echo "AgentBOM CLI release moves to WasmAgent/agentbom after schema stabilization."
          echo "MCP Posture CLI release moves to WasmAgent/wasmagent-js after runtime scanning primitives stabilize."
