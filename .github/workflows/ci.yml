name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Validate example fixtures
        run: |
          # Ensure example JSON files are valid JSON
          for f in examples/**/*.json; do
            python3 -m json.tool "$f" > /dev/null && echo "ok: $f" || (echo "INVALID JSON: $f" && exit 1)
          done
