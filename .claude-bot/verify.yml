# agent-trust-infra verify manifest — TypeScript/Node project
commands:
  - name: install
    cmd: npm install --frozen-lockfile
    timeout: 3m
    level: 1
  - name: build
    cmd: npm run build
    timeout: 5m
    level: 1
  - name: typecheck
    cmd: npx tsc --noEmit
    timeout: 3m
    level: 2
  - name: test
    cmd: npm test
    timeout: 10m
    level: 3
