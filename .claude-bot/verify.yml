# agent-trust-infra verify manifest — TypeScript/Node project
commands:
  - name: install
    cmd: npm install --frozen-lockfile
    timeout: 3m
    level: 1
  - name: build
    cmd: npm run build
    timeout: 3m
    level: 1
  - name: typecheck
    cmd: npm run typecheck
    timeout: 3m
    level: 2
  - name: lint
    cmd: npm run lint
    timeout: 2m
    level: 2
  - name: test
    cmd: npm test
    timeout: 3m
    level: 3
  - name: strict-typecheck
    cmd: npx tsc --noEmit --strict
    timeout: 3m
    level: 4
  - name: no-explicit-any
    cmd: npx eslint .
    timeout: 2m
    level: 4
